# Local single-operator product CI — no SaaS deploy.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install fastapi "uvicorn[standard]" pydantic apscheduler pyyaml psutil cryptography aiohttp pytest pytest-asyncio httpx

      - name: Unit / API tests
        run: python -m pytest tests/ -q --tb=short --ignore=tests/test_terminal_e2e.py
        env:
          PI_NO_AUTH: "1"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dashboard deps
        working-directory: dashboard
        run: npm ci

      - name: Typecheck dashboard
        working-directory: dashboard
        run: npx vue-tsc -b --pretty false

      - name: Build dashboard
        working-directory: dashboard
        run: npx vite build
